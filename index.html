<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界座標與照片紀錄 - 雲端共享版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #4A90E2;
            --bg: #F5F7FA;
            --card-bg: #FFFFFF;
            --text: #333333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: var(--primary);
        }
        .toggle-btn-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .toggle-btn {
            background-color: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .toggle-btn:hover {
            background-color: var(--primary);
            color: white;
            transform: translateY(-2px);
        }
        .hidden-panel {
            display: none !important;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .control-panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            display: grid;
            gap: 15px;
            grid-template-columns: 1fr 1fr;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .control-panel select, .control-panel input, .control-panel button {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .control-panel button.submit-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            grid-column: span 2;
            transition: background 0.2s;
        }
        .control-panel button.submit-btn:hover {
            background-color: #357ABD;
        }
        .control-panel button.submit-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .full-width {
            grid-column: span 2;
        }
        .filter-section {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
        .card-info {
            padding: 15px;
        }
        .continent-tag {
            display: inline-block;
            background: #E1F0FF;
            color: var(--primary);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .coordinate {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            text-align: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            transition: background 0.2s;
        }
        /* 增加點擊時的回饋效果 */
        .coordinate:active {
            background: #e0e0e0;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        .loading-text {
            text-align: center;
            grid-column: span 3;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌍 世界座標與照片紀錄 (雲端版)</h1>

    <div class="toggle-btn-container">
        <button id="togglePanelBtn" class="toggle-btn" onclick="toggleInputPanel()">➕ 新增紀錄</button>
    </div>

    <div class="control-panel hidden-panel" id="inputPanel">
        <input type="file" id="photoInput" accept="image/*" class="full-width">
        <input type="text" id="coordsInput" class="full-width" placeholder="貼上座標 (例: 25.0339, 121.5644 或帶有括號)">
        <select id="continentInput" class="full-width">
            <option value="" disabled selected>選擇大洲</option>
            <option value="亞洲">亞洲</option>
            <option value="歐洲">歐洲</option>
            <option value="北美洲">北美洲</option>
            <option value="南美洲">南美洲</option>
            <option value="非洲">非洲</option>
            <option value="大洋洲">大洋洲</option>
            <option value="南極洲">南極洲</option>
        </select>
        <button id="submitBtn" class="submit-btn" onclick="addRecord()">上傳至雲端</button>
    </div>

    <div class="filter-section">
        <strong>🔍 依大洲尋找：</strong>
        <select id="filterSelect" onchange="fetchAndRenderGallery()" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd;">
            <option value="全部">全部顯示</option>
            <option value="亞洲">亞洲</option>
            <option value="歐洲">歐洲</option>
            <option value="北美洲">北美洲</option>
            <option value="南美洲">南美洲</option>
            <option value="非洲">非洲</option>
            <option value="大洋洲">大洋洲</option>
            <option value="南極洲">南極洲</option>
        </select>
    </div>

    <div class="gallery" id="gallery"></div>
</div>

<div class="toast" id="toast">座標已複製！</div>

<script>
    const SUPABASE_URL = 'https://hixvrxzogxwjpzdirdwm.supabase.co'; 
    const SUPABASE_ANON_KEY = 'sb_publishable_uaIm3GV4mn0dTiyixVx5kA_OXI1iTtA';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    window.onload = function() {
        fetchAndRenderGallery();
    };

    function toggleInputPanel() {
        const panel = document.getElementById('inputPanel');
        const btn = document.getElementById('togglePanelBtn');
        
        if (panel.classList.contains('hidden-panel')) {
            panel.classList.remove('hidden-panel');
            btn.innerText = '✖ 關閉面板';
            btn.style.backgroundColor = '#f0f0f0';
            btn.style.borderColor = '#ccc';
            btn.style.color = '#555';
        } else {
            panel.classList.add('hidden-panel');
            btn.innerText = '➕ 新增紀錄';
            btn.style.backgroundColor = 'transparent';
            btn.style.borderColor = 'var(--primary)';
            btn.style.color = 'var(--primary)';
        }
    }

    let autoDetectTimer;
    document.getElementById('coordsInput').addEventListener('input', function(e) {
        clearTimeout(autoDetectTimer);
        const val = e.target.value.trim();
        
        autoDetectTimer = setTimeout(async () => {
            if (!val) return;
            let cleanCoords = val.replace(/[\(\)\[\]\s]/g, ''); 
            let coordArray = cleanCoords.split(',');

            if (coordArray.length === 2 && !isNaN(coordArray[0]) && !isNaN(coordArray[1])) {
                const lat = parseFloat(coordArray[0]);
                const lng = parseFloat(coordArray[1]);

                try {
                    const res = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}&localityLanguage=zh-TW`);
                    const data = await res.json();
                    
                    const continentMap = { 'AF': '非洲', 'AN': '南極洲', 'AS': '亞洲', 'EU': '歐洲', 'NA': '北美洲', 'OC': '大洋洲', 'SA': '南美洲' };

                    if (data.continentCode && continentMap[data.continentCode]) {
                        document.getElementById('continentInput').value = continentMap[data.continentCode];
                        const toast = document.getElementById('toast');
                        const countryInfo = data.countryName ? `${data.countryName} ` : '';
                        toast.innerText = `🌍 已自動定位：${countryInfo}(${continentMap[data.continentCode]})`;
                        
                        toast.style.display = 'block';
                        setTimeout(() => { toast.style.opacity = '1'; }, 10);
                        setTimeout(() => {
                            toast.style.opacity = '0';
                            setTimeout(() => { 
                                toast.style.display = 'none'; 
                                toast.innerText = '座標已複製！'; 
                            }, 300);
                        }, 3000);
                    }
                } catch (err) {
                    console.log('自動定位失敗', err);
                }
            }
        }, 800);
    });

    async function fetchAndRenderGallery() {
        const gallery = document.getElementById('gallery');
        const filter = document.getElementById('filterSelect').value;
        gallery.innerHTML = '<div class="loading-text">雲端資料載入中...</div>';

        try {
            let query = supabaseClient.from('maps').select('*');
            if (filter !== '全部') query = query.eq('continent', filter);
            query = query.order('created_at', { ascending: false });

            const { data, error } = await query;
            if (error) throw error;
            gallery.innerHTML = ''; 

            if (!data || data.length === 0) {
                gallery.innerHTML = '<div class="loading-text">目前沒有這區的紀錄。</div>';
                return;
            }

            data.forEach(record => {
                const coordText = `${record.latitude}, ${record.longitude}`;
                const card = document.createElement('div');
                card.className = 'card';
                // 修改處：將 onclick 直接綁定，並改文字為 (點擊複製)
                card.innerHTML = `
                    <img src="${record.photo_url}" alt="Location Photo">
                    <div class="card-info">
                        <div class="continent-tag">${record.continent}</div>
                        <div class="coordinate" onclick="copyToClipboard('${coordText}')">
                            ${coordText}<br>
                            <small style="font-size: 10px; color: #888;">(點擊複製)</small>
                        </div>
                    </div>
                `;
                gallery.appendChild(card);
            });
        } catch (err) {
            console.error('讀取資料失敗:', err.message);
            gallery.innerHTML = '<div class="loading-text" style="color:red;">資料載入失敗，請確認資料庫權限。</div>';
        }
    }

    async function addRecord() {
        const photoInput = document.getElementById('photoInput');
        const coordsInput = document.getElementById('coordsInput').value.trim();
        const continent = document.getElementById('continentInput').value;
        const submitBtn = document.getElementById('submitBtn');

        if (!photoInput.files[0] || !coordsInput || !continent) {
            alert('請選擇照片、貼上座標並確認大洲已被選取！');
            return;
        }

        let cleanCoords = coordsInput.replace(/[\(\)\[\]\s]/g, ''); 
        let coordArray = cleanCoords.split(',');

        if (coordArray.length !== 2 || isNaN(coordArray[0]) || isNaN(coordArray[1])) {
            alert('座標格式不正確！請確認是否為「緯度,經度」');
            return;
        }

        const lat = parseFloat(coordArray[0]);
        const lng = parseFloat(coordArray[1]);

        submitBtn.disabled = true;
        submitBtn.innerText = '正在上傳照片到雲端...';

        try {
            const file = photoInput.files[0];
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}.${fileExt}`;

            const { data: storageData, error: storageError } = await supabaseClient.storage
                .from('photos')
                .upload(fileName, file);

            if (storageError) throw storageError;

            const { data: urlData } = supabaseClient.storage
                .from('photos')
                .getPublicUrl(fileName);
            
            const publicPhotoUrl = urlData.publicUrl;
            submitBtn.innerText = '正在寫入資料庫...';

            const { error: dbError } = await supabaseClient
                .from('maps')
                .insert([{ continent: continent, latitude: lat, longitude: lng, photo_url: publicPhotoUrl }]);

            if (dbError) throw dbError;
            
            photoInput.value = '';
            document.getElementById('coordsInput').value = '';
            document.getElementById('continentInput').selectedIndex = 0; 
            toggleInputPanel();
            fetchAndRenderGallery();

            setTimeout(() => { alert('成功上傳並保存至雲端！'); }, 300);
        } catch (err) {
            console.error('上傳失敗:', err);
            alert('上傳發生錯誤: ' + err.message);
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = '上傳至雲端';
        }
    }

    // 更新後的複製函數 (依賴直接點擊觸發)
    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.opacity = '1'; }, 10);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => { toast.style.display = 'none'; }, 300);
            }, 2000);
        }).catch(err => {
            alert('複製失敗，請手動複製。');
        });
    }
</script>

</body>
</html>
