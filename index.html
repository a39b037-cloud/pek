    <style>
        :root {
            --primary: #4A90E2;
            --bg: #F5F7FA;
            --card-bg: #FFFFFF;
            --text: #333333;
            --sponsor-green: #3da272; /* 💡 復刻 image_52e9a1.jpg 的超質感綠色 */
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: var(--primary);
        }
        .toggle-btn-container {
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .toggle-btn {
            background-color: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .toggle-btn:hover {
            background-color: var(--primary);
            color: white;
            transform: translateY(-2px);
        }
        /* 🌟 新增：上方贊助按鈕樣式 */
        .sponsor-btn {
            background-color: var(--sponsor-green);
            color: white;
            border: 2px solid var(--sponsor-green);
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(61, 162, 114, 0.15);
        }
        .sponsor-btn:hover {
            background-color: white;
            color: var(--sponsor-green);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(61, 162, 114, 0.25);
        }
        .hidden-panel {
            display: none !important;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .control-panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            display: grid;
            gap: 15px;
            grid-template-columns: 1fr 1fr;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .control-panel select, .control-panel input, .control-panel button {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .control-panel button.submit-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            grid-column: span 2;
            transition: background 0.2s;
        }
        .control-panel button.submit-btn:hover {
            background-color: #357ABD;
        }
        .control-panel button.submit-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .full-width {
            grid-column: span 2;
        }
        .filter-section {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card img {
            width: 100%;
            height: 250px; 
            object-fit: contain; 
            background-color: #eee; 
        }
        .card-info {
            padding: 15px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .continent-tag {
            background: #E1F0FF;
            color: var(--primary);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .card-marker {
            font-size: 16px;
            cursor: default;
            user-select: none;
            -webkit-user-select: none;
        }
        .report-btn {
            background: none;
            border: none;
            color: #999;
            font-size: 13px;
            cursor: pointer;
            transition: color 0.2s;
            padding: 0;
        }
        .report-btn:hover {
            color: #e74c3c;
        }
        .coordinate {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            text-align: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            transition: background 0.2s;
        }
        .coordinate:active {
            background: #e0e0e0;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        .loading-text {
            text-align: center;
            grid-column: span 3;
            color: #888;
        }
        .modal-overlay {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: fadeIn 0.2s ease;
        }
        .modal-content h3 { margin-top: 0; color: var(--text); }
        .modal-content textarea {
            width: 100%; box-sizing: border-box; padding: 10px;
            border: 1px solid #ddd; border-radius: 6px; min-height: 80px; resize: vertical; font-family: inherit;
        }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px; }
        .modal-btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .cancel-btn { background: #eee; color: #555; }
        .submit-report-btn { background: #e74c3c; color: white; }

        /* 🌟 新增：底部精緻贊助區塊的樣式 */
        .footer-sponsor-box {
            text-align: center;
            margin-top: 50px;
            padding: 24px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.02);
        }
        .footer-sponsor-box p {
            margin: 0 0 15px 0;
            color: #555;
            font-size: 15px;
            line-height: 1.6;
        }

        @media (max-width: 600px) {
            .gallery { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .card img { height: 140px; } 
            .card-info { padding: 10px; }
            .coordinate { font-size: 11px; padding: 8px 4px; }
            .continent-tag { font-size: 11px; padding: 3px 6px; }
            .card-marker { font-size: 14px; } 
            .report-btn { font-size: 11px; }
            .filter-section { flex-direction: column; align-items: stretch; }
            .toggle-btn, .sponsor-btn { width: 100%; justify-content: center; box-sizing: border-box; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>◉>◉美片座標照片紀錄</h1>

    <div class="toggle-btn-container">
        <button id="togglePanelBtn" class="toggle-btn" onclick="toggleInputPanel()">➕ 新增紀錄</button>
        <!-- 🌟 新增：上方的贊助支持按鈕，請把底下的網址換成你的 Ko-fi 網址 -->
        <a href="https://ko-fi.com/a39b037" target="_blank" class="sponsor-btn">☕ 贊助支持</a>
    </div>

    <div class="control-panel hidden-panel" id="inputPanel">
        <input type="file" id="photoInput" accept="image/*" class="full-width">
        <input type="text" id="coordsInput" class="full-width" placeholder="貼上座標 (例: 25.0339, 121.5644)">
        <select id="continentInput" class="full-width">
            <option value="" disabled selected>選擇地區</option>
            <option value="台灣">台灣</option>
            <option value="日本">日本</option>
            <option value="韓國">韓國</option>
            <option value="亞洲">亞洲(其他)</option>
            <option value="歐洲">歐洲</option>
            <option value="北美洲">北美洲</option>
            <option value="南美洲">南美洲</option>
            <option value="非洲">非洲</option>
            <option value="大洋洲">大洋洲</option>
            <option value="南極洲">南極洲</option>
        </select>
        <select id="markerInput" class="full-width">
            <option value="🍄" selected>標記圖案：🍄 蘑菇 (預設)</option>
            <option value="🌸">標記圖案：🌸 花朵</option>
        </select>
        <button id="submitBtn" class="submit-btn" onclick="addRecord()">上傳至雲端</button>
    </div>

    <div class="filter-section">
        <strong>🔍 依地區尋找：</strong>
        <select id="filterSelect" onchange="fetchAndRenderGallery()" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd;">
            <option value="全部">全部顯示</option>
            <option value="台灣">台灣</option>
            <option value="日本">日本</option>
            <option value="韓國">韓國</option>
            <option value="亞洲">亞洲(其他)</option>
            <option value="歐洲">歐洲</option>
            <option value="北美洲">北美洲</option>
            <option value="南美洲">南美洲</option>
            <option value="非洲">非洲</option>
            <option value="大洋洲">大洋洲</option>
            <option value="南極洲">南極洲</option>
        </select>

        <strong style="margin-left: 10px;">⇅ 排序方式：</strong>
        <select id="sortSelect" onchange="fetchAndRenderGallery()" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd;">
            <option value="time">依時間 (最新上傳)</option>
            <option value="coord">依座標 (緯度北到南)</option>
        </select>
    </div>

    <div class="gallery" id="gallery"></div>

    <!-- 🌟 新增：底部溫馨贊助小盒，請記得把 href 裡面的網址換成你的 Ko-fi 網址 -->
    <div class="footer-sponsor-box">
        <p>你的支持會幫忙分擔網站營運成本，也讓我更有動力改善它。❤️<br><small style="color:#888;">喜歡這個地圖紀錄嗎？歡迎點擊下方請我喝杯咖啡！</small></p>
        <a href="https://ko-fi.com/a39b037" target="_blank" class="sponsor-btn">☕ 買杯咖啡</a>
    </div>
</div>

<div class="toast" id="toast">座標已複製！</div>

<div class="modal-overlay" id="reportModal">
    <div class="modal-content">
        <h3>⚠️ 錯誤回報</h3>
        <p style="font-size: 14px; color: #666; margin-bottom: 5px;">請簡述這筆紀錄的問題。</p>
        <textarea id="reportReason" placeholder="輸入回報內容..."></textarea>
        <div class="modal-actions">
            <button class="modal-btn cancel-btn" onclick="closeReportModal()">取消</button>
            <button class="modal-btn submit-report-btn" id="submitReportBtn" onclick="submitReport()">送出回報</button>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://ciptzjjzrohkoycgsdmr.supabase.co'; 
    const SUPABASE_ANON_KEY = 'sb_publishable_QzhsNYmLcQaX_GRdQqnRkw_iV6a0HpG';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentReportId = null;

    window.onload = function() { 
        fetchAndRenderGallery(); 
        trackVisitQuietly(); 
    };

    async function trackVisitQuietly() {
        try {
            await supabaseClient.from('visits').insert([{}]);
        } catch (err) {
            console.log('流量記錄失敗', err);
        }
    }

    function toggleInputPanel() {
        const panel = document.getElementById('inputPanel');
        const btn = document.getElementById('togglePanelBtn');
        if (panel.classList.contains('hidden-panel')) {
            panel.classList.remove('hidden-panel');
            btn.innerText = '✖ 關閉面板';
            btn.style.backgroundColor = '#f0f0f0';
            btn.style.borderColor = '#ccc';
            btn.style.color = '#555';
        } else {
            panel.classList.add('hidden-panel');
            btn.innerText = '➕ 新增紀錄';
            btn.style.backgroundColor = 'transparent';
            btn.style.borderColor = 'var(--primary)';
            btn.style.color = 'var(--primary)';
        }
    }

    let autoDetectTimer;
    document.getElementById('coordsInput').addEventListener('input', function(e) {
        clearTimeout(autoDetectTimer);
        const val = e.target.value.trim();
        autoDetectTimer = setTimeout(async () => {
            if (!val) return;
            let cleanCoords = val.replace(/[\(\)\[\]\s]/g, ''); 
            let coordArray = cleanCoords.split(',');
            if (coordArray.length === 2 && !isNaN(coordArray[0]) && !isNaN(coordArray[1])) {
                const lat = parseFloat(coordArray[0]);
                const lng = parseFloat(coordArray[1]);
                try {
                    const res = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}&localityLanguage=zh-TW`);
                    const data = await res.json();
                    let detectedRegion = "";
                    if (data.countryCode === 'TW') detectedRegion = "台灣";
                    else if (data.countryCode === 'JP') detectedRegion = "日本";
                    else if (data.countryCode === 'KR') detectedRegion = "韓國";
                    else if (data.continentCode) {
                        const continentMap = { 'AF': '非洲', 'AN': '南極洲', 'EU': '歐洲', 'NA': '北美洲', 'OC': '大洋洲', 'SA': '南美洲' };
                        if (data.continentCode === 'AS') detectedRegion = "亞洲";
                        else detectedRegion = continentMap[data.continentCode] || "";
                    }
                    if (detectedRegion) {
                        document.getElementById('continentInput').value = detectedRegion;
                        const toast = document.getElementById('toast');
                        const countryInfo = data.countryName ? `${data.countryName} ` : '';
                        toast.innerText = `🌍 已自動定位：${countryInfo}`;
                        toast.style.display = 'block';
                        setTimeout(() => { toast.style.opacity = '1'; }, 10);
                        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => { toast.style.display = 'none'; toast.innerText = '座標已複製！'; }, 300); }, 3000);
                    }
                } catch (err) { console.log('自動定位失敗', err); }
            }
        }, 800);
    });

    async function fetchAndRenderGallery() {
        const gallery = document.getElementById('gallery');
        const filter = document.getElementById('filterSelect').value;
        const sortMethod = document.getElementById('sortSelect').value;

        gallery.innerHTML = '<div class="loading-text">皮皮資料載入中...</div>';

        try {
            let query = supabaseClient.from('maps').select('*');
            if (filter !== '全部') query = query.eq('continent', filter);
            if (sortMethod === 'time') {
                query = query.order('created_at', { ascending: false });
            } else if (sortMethod === 'coord') {
                query = query.order('latitude', { ascending: false }).order('longitude', { ascending: true });
            }

            const { data, error } = await query;
            if (error) throw error;
            gallery.innerHTML = ''; 

            if (!data || data.length === 0) {
                gallery.innerHTML = '<div class="loading-text">目前沒有這區的紀錄。</div>';
                return;
            }

            data.forEach(record => {
                const coordText = `${record.latitude}, ${record.longitude}`;
                const card = document.createElement('div');
                card.className = 'card';
                const currentMarker = record.marker || '🍄';

                card.innerHTML = `
                    <img src="${record.photo_url}" alt="Location Photo" loading="lazy">
                    <div class="card-info">
                        <div class="card-header">
                            <div class="continent-tag">${record.continent}</div>
                            <div class="card-marker">${currentMarker}</div>
                            <button class="report-btn" onclick="openReportModal(${record.id})">⚠️ 報錯</button>
                        </div>
                        <div class="coordinate" onclick="copyToClipboard('${coordText}')">
                            ${coordText}<br>
                            <small style="font-size: 10px; color: #888;">(點擊複製)</small>
                        </div>
                    </div>
                `;
                gallery.appendChild(card);
            });
        } catch (err) {
            console.error('讀取資料失敗:', err.message);
            gallery.innerHTML = '<div class="loading-text" style="color:red;">資料載入失敗，請確認資料庫權限。</div>';
        }
    }

    async function addRecord() {
        const photoInput = document.getElementById('photoInput');
        const coordsInput = document.getElementById('coordsInput').value.trim();
        const continent = document.getElementById('continentInput').value;
        const marker = document.getElementById('markerInput').value; 
        const submitBtn = document.getElementById('submitBtn');

        if (!photoInput.files[0] || !coordsInput || !continent) {
            alert('請選擇照片、貼上座標並確認地區已被選取！'); return;
        }

        let cleanCoords = coordsInput.replace(/[\(\)\[\]\s]/g, ''); 
        let coordArray = cleanCoords.split(',');
        if (coordArray.length !== 2 || isNaN(coordArray[0]) || isNaN(coordArray[1])) {
            alert('座標格式不正確！請確認是否為「緯度,經度」'); return;
        }

        const lat = parseFloat(coordArray[0]);
        const lng = parseFloat(coordArray[1]);

        submitBtn.disabled = true;
        submitBtn.innerText = '📸 正在壓縮照片...'; 

        try {
            const originalFile = photoInput.files[0];
            const fileExt = originalFile.name.split('.').pop();
            const fileName = `${Date.now()}.${fileExt}`;

            const options = {
                maxSizeMB: 0.5,
                maxWidthOrHeight: 1200,
                useWebWorker: true
            };
            
            let fileToUpload = originalFile;
            try {
                fileToUpload = await imageCompression(originalFile, options);
            } catch (error) {
                console.log('圖片壓縮失敗，改用原圖上傳', error);
            }

            submitBtn.innerText = '☁️ 正在上傳至雲端...';
            const { data: storageData, error: storageError } = await supabaseClient.storage.from('photos').upload(fileName, fileToUpload);
            if (storageError) throw storageError;

            const { data: urlData } = supabaseClient.storage.from('photos').getPublicUrl(fileName);
            const publicPhotoUrl = urlData.publicUrl;
            
            submitBtn.innerText = '💾 寫入資料庫...';
            const { error: dbError } = await supabaseClient.from('maps').insert([{ 
                continent: continent, 
                latitude: lat, 
                longitude: lng, 
                photo_url: publicPhotoUrl,
                marker: marker 
            }]);
            if (dbError) throw dbError;
            
            photoInput.value = ''; 
            document.getElementById('coordsInput').value = ''; 
            document.getElementById('continentInput').selectedIndex = 0; 
            document.getElementById('markerInput').value = '🍄'; 
            
            toggleInputPanel(); 
            fetchAndRenderGallery();
            setTimeout(() => { alert('成功上傳並保存至雲端！'); }, 300);
        } catch (err) {
            alert('上傳發生錯誤: ' + err.message);
        } finally {
            submitBtn.disabled = false; submitBtn.innerText = '上傳至雲端';
        }
    }

    function openReportModal(id) {
        currentReportId = id;
        document.getElementById('reportReason').value = ''; 
        document.getElementById('reportModal').style.display = 'flex';
    }

    function closeReportModal() {
        currentReportId = null;
        document.getElementById('reportModal').style.display = 'none';
    }

    async function submitReport() {
        const reason = document.getElementById('reportReason').value.trim();
        const reportBtn = document.getElementById('submitReportBtn');
        if (!reason) { alert('請稍微描述一下錯誤情形！'); return; }
        reportBtn.disabled = true; reportBtn.innerText = '送出中...';
        try {
            const { error } = await supabaseClient.from('reports').insert([{ target_id: currentReportId, reason: reason }]);
            if (error) throw error;
            alert('回報成功！感謝您的協助。');
            closeReportModal();
        } catch (err) {
            console.error('回報失敗:', err);
            alert('回報失敗，請確認資料庫權限。');
        } finally {
            reportBtn.disabled = false; reportBtn.innerText = '送出回報';
        }
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById('toast');
            toast.innerText = '座標已複製！';
            toast.style.display = 'block';
            setTimeout(() => { toast.style.opacity = '1'; }, 10);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => { toast.style.display = 'none'; }, 300); }, 2000);
        }).catch(err => { alert('複製失敗，請手動複製。'); });
    }
</script>

</body>
</html>
